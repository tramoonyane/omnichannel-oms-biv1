<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>OMS-BI Login</title>

</head>

<body>

    <h1>OmniChannel OMS-BI</h1>

    <form id="loginForm">

        <div>

            <label for="email">
                Email
            </label>

            <br>

            <input
                type="email"
                id="email"
                required>

        </div>

        <br>

        <div>

            <label for="password">
                Password
            </label>

            <br>

            <input
                type="password"
                id="password"
                required>

        </div>

        <br>

        <button type="submit">

            Login

        </button>

    </form>

    <br>

    <div id="message"></div>

    <script
        type="module"
        src="../controllers/login.controller.js">
    </script>

</body>

</html>
